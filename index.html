<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompMaker</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div class="app">
        <!-- Top bar: project selector + library/settings actions -->
        <header class="topbar">
            <div class="project-select-wrap">
                <select id="projectSelect" class="project-select" aria-label="Project"></select>
                <button id="projectMenuBtn" class="icon-btn" title="Project actions" aria-label="Project actions">
                    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/>
                    </svg>
                </button>
            </div>
            <div class="topbar-actions">
                <button id="useActiveBtn" class="icon-btn" title="Use active comp as preset" aria-label="Use active comp as preset">
                    <svg viewBox="0 0 20 20" width="17" height="17" aria-hidden="true">
                        <rect x="3.25" y="3.75" width="13.5" height="9.5" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M10 5.5v4.4m0 0L8.2 8.1M10 9.9l1.8-1.8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6 16.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="addPresetBtn" class="icon-btn icon-btn-accent" title="Add preset" aria-label="Add preset">
                    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
                    </svg>
                </button>

                <span class="topbar-divider" aria-hidden="true"></span>

                <button id="importBtn" class="icon-btn" title="Import presets" aria-label="Import">
                    <svg viewBox="0 0 20 20" width="17" height="17" aria-hidden="true">
                        <path d="M10 3v8m0 0L6.5 7.5M10 11l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4 13v2.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="exportBtn" class="icon-btn" title="Export project" aria-label="Export">
                    <svg viewBox="0 0 20 20" width="17" height="17" aria-hidden="true">
                        <path d="M10 13V5m0 0L6.5 8.5M10 5l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4 13v2.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
                    <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
                        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
                        <path d="M19.4 13a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V19a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.9 17.3a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.7 8.9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1.03-1.56V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Content: preset cards -->
        <main class="content">
            <div id="presetGrid" class="preset-grid"></div>
            <div id="emptyState" class="empty-state" hidden>
                <div class="empty-icon">
                    <svg viewBox="0 0 48 48" width="44" height="44" aria-hidden="true">
                        <rect x="8" y="12" width="32" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M24 19v10M19 24h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="empty-title">No presets yet</div>
                <div class="empty-sub">Add a preset or capture your active comp to get started.</div>
            </div>
        </main>
    </div>

    <!-- Mount points for layered UI -->
    <div id="dropOverlay" class="drop-overlay">
        <div class="drop-card">Drop a <strong>.compmaker.json</strong> file to import</div>
    </div>
    <div id="modalRoot"></div>
    <div id="menuRoot"></div>
    <div id="toastRoot"></div>

    <!-- Scripts: library → data → ui → controller -->
    <script src="./lib/CSInterface.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
