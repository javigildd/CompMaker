<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompMaker</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div class="app">
        <!-- Top bar: project selector + library/settings actions -->
        <header class="topbar">
            <div class="project-select-wrap">
                <select id="projectSelect" class="project-select" aria-label="Project"></select>
                <button id="projectMenuBtn" class="icon-btn" title="Project actions" aria-label="Project actions">
                    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/>
                    </svg>
                </button>
            </div>
            <div class="topbar-actions">
                <button id="importBtn" class="icon-btn" title="Import presets" aria-label="Import">
                    <svg viewBox="0 0 20 20" width="17" height="17" aria-hidden="true">
                        <path d="M10 3v8m0 0L6.5 7.5M10 11l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4 13v2.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="exportBtn" class="icon-btn" title="Export project" aria-label="Export">
                    <svg viewBox="0 0 20 20" width="17" height="17" aria-hidden="true">
                        <path d="M10 13V5m0 0L6.5 8.5M10 5l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4 13v2.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
                    <svg viewBox="0 0 20 20" width="17" height="17" aria-hidden="true">
                        <circle cx="10" cy="10" r="2.4" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M10 2.5v2M10 15.5v2M2.5 10h2M15.5 10h2M4.7 4.7l1.4 1.4M13.9 13.9l1.4 1.4M15.3 4.7l-1.4 1.4M6.1 13.9l-1.4 1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Content: preset cards -->
        <main class="content">
            <div id="presetGrid" class="preset-grid"></div>
            <div id="emptyState" class="empty-state" hidden>
                <div class="empty-icon">
                    <svg viewBox="0 0 48 48" width="44" height="44" aria-hidden="true">
                        <rect x="8" y="12" width="32" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M24 19v10M19 24h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="empty-title">No presets yet</div>
                <div class="empty-sub">Add a preset or capture your active comp to get started.</div>
            </div>
        </main>

        <!-- Bottom bar: primary actions -->
        <footer class="bottombar">
            <button id="addPresetBtn" class="btn btn-primary">
                <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                    <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                Add Preset
            </button>
            <button id="useActiveBtn" class="btn btn-ghost" title="Capture the active composition as a new preset">
                Use Active Comp
            </button>
        </footer>
    </div>

    <!-- Mount points for layered UI -->
    <div id="dropOverlay" class="drop-overlay">
        <div class="drop-card">Drop a <strong>.compmaker.json</strong> file to import</div>
    </div>
    <div id="modalRoot"></div>
    <div id="menuRoot"></div>
    <div id="toastRoot"></div>

    <!-- Scripts: library → data → ui → controller -->
    <script src="./lib/CSInterface.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
