<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompMaker</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div class="app">
        <!-- Top bar: project selector + library/settings actions -->
        <header class="topbar">
            <div class="project-select-wrap">
                <select id="projectSelect" class="project-select" aria-label="Project"></select>
                <button id="projectMenuBtn" class="icon-btn" title="Project actions" aria-label="Project actions">
                    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/>
                    </svg>
                </button>
            </div>
            <div class="topbar-actions">
                <button id="useActiveBtn" class="icon-btn" title="Use active comp as preset" aria-label="Use active comp as preset">
                    <svg viewBox="0 0 20 20" width="17" height="17" aria-hidden="true">
                        <rect x="3.25" y="3.75" width="13.5" height="9.5" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M10 5.5v4.4m0 0L8.2 8.1M10 9.9l1.8-1.8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6 16.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="addPresetBtn" class="icon-btn icon-btn-accent" title="Add preset" aria-label="Add preset">
                    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
                    </svg>
                </button>

                <span class="topbar-divider" aria-hidden="true"></span>

                <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Content: preset cards -->
        <main class="content">
            <div id="presetGrid" class="preset-grid"></div>
        </main>
    </div>

    <!-- Mount points for layered UI -->
    <div id="dropOverlay" class="drop-overlay">
        <div class="drop-card">Drop a <strong>.compmaker.json</strong> file to import</div>
    </div>
    <div id="modalRoot"></div>
    <div id="menuRoot"></div>
    <div id="toastRoot"></div>

    <!-- Scripts: library → data → ui → controller -->
    <script src="./lib/CSInterface.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
